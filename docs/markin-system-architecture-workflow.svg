<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">MarkIn System Architecture and Workflow</title>
  <desc id="desc">Report-ready architecture diagram for the MarkIn Smart Attendance Management System showing users, frontend, backend, MongoDB, AI service pipelines, model stack, and data storage flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 24; ry: 24; }
      .section { fill: #f9fbff; stroke: #cbd5e1; stroke-width: 2; rx: 20; ry: 20; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .box-soft { fill: #f5f7fb; stroke: #64748b; stroke-width: 2; rx: 16; ry: 16; }
      .box-accent { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 16; ry: 16; }
      .box-ai { fill: #eefbf3; stroke: #15803d; stroke-width: 2; rx: 16; ry: 16; }
      .box-db { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 16; ry: 16; }
      .box-note { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; ry: 16; }
      .mini { fill: #ffffff; stroke: #475569; stroke-width: 1.6; rx: 12; ry: 12; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .section-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .box-subtitle { font: 700 16px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .body { font: 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #334155; }
      .tiny { font: 13px Arial, Helvetica, sans-serif; fill: #475569; }
      .step { font: 700 14px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .arrow { stroke: #1f2937; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #334155; stroke-width: 2.2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .label { font: 600 14px Arial, Helvetica, sans-serif; fill: #1e293b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1280"/>
  <rect class="frame" x="22" y="22" width="1756" height="1236"/>

  <text class="title" x="900" y="70" text-anchor="middle">MarkIn - Smart Attendance Management System</text>
  <text class="subtitle" x="900" y="100" text-anchor="middle">System Architecture, AI Pipeline, Data Flow, and Storage Path</text>

  <rect class="section" x="55" y="130" width="450" height="990"/>
  <rect class="section" x="530" y="130" width="500" height="990"/>
  <rect class="section" x="1055" y="130" width="690" height="990"/>

  <text class="section-title" x="280" y="170" text-anchor="middle">Users and Web Platform</text>
  <text class="section-title" x="780" y="170" text-anchor="middle">Backend and Database</text>
  <text class="section-title" x="1400" y="170" text-anchor="middle">AI Service and Model Pipeline</text>

  <rect class="box" x="95" y="205" width="150" height="60"/>
  <rect class="box" x="315" y="205" width="150" height="60"/>
  <text class="box-title" x="170" y="242" text-anchor="middle">Students</text>
  <text class="box-title" x="390" y="242" text-anchor="middle">Teachers</text>

  <rect class="box-accent" x="105" y="315" width="350" height="120"/>
  <text class="box-title" x="280" y="350" text-anchor="middle">React Frontend</text>
  <text class="body" x="130" y="380">- Login and role-based navigation</text>
  <text class="body" x="130" y="404">- Student dashboard, teacher dashboard</text>
  <text class="body" x="130" y="428">- Face enrollment, class join, attendance capture</text>

  <rect class="box-soft" x="105" y="470" width="350" height="135"/>
  <text class="box-title" x="280" y="505" text-anchor="middle">User Workflows</text>
  <text class="body" x="130" y="535">Student:</text>
  <text class="small" x="200" y="535">Join class - enroll face - track attendance</text>
  <text class="body" x="130" y="562">Teacher:</text>
  <text class="small" x="200" y="562">Create class - start session - review results</text>
  <text class="body" x="130" y="589">Outputs:</text>
  <text class="small" x="200" y="589">Dashboards, notes, history, export</text>

  <rect class="box-soft" x="105" y="640" width="350" height="150"/>
  <text class="box-title" x="280" y="675" text-anchor="middle">Input Sources</text>
  <text class="body" x="130" y="705">- Student face images (6 to 10 images)</text>
  <text class="body" x="130" y="731">- Classroom capture images from upload or camera</text>
  <text class="body" x="130" y="757">- Join code or join link for roster mapping</text>
  <text class="body" x="130" y="783">- Teacher review decisions and session notes</text>

  <rect class="box-note" x="105" y="825" width="350" height="210"/>
  <text class="box-title" x="280" y="860" text-anchor="middle">What Leaves the Frontend</text>
  <text class="body" x="130" y="892">1. Enrollment request</text>
  <text class="small" x="160" y="914">studentId + reference images</text>
  <text class="body" x="130" y="944">2. Attendance session request</text>
  <text class="small" x="160" y="966">teacherId + classId + classroom images</text>
  <text class="body" x="130" y="996">3. Finalization request</text>
  <text class="small" x="160" y="1018">accepted matches + manual adds + notes</text>

  <rect class="box-accent" x="570" y="205" width="420" height="115"/>
  <text class="box-title" x="780" y="240" text-anchor="middle">Node.js + Express Backend</text>
  <text class="body" x="600" y="272">- Auth, classroom, roster, attendance orchestration</text>
  <text class="body" x="600" y="296">- REST API between frontend, MongoDB, and AI service</text>

  <rect class="box-soft" x="570" y="355" width="420" height="175"/>
  <text class="box-title" x="780" y="390" text-anchor="middle">Backend Control Flow</text>
  <text class="body" x="595" y="422">- Validate user role and classroom ownership</text>
  <text class="body" x="595" y="448">- Load class roster from ClassMembership</text>
  <text class="body" x="595" y="474">- Build sessionId and send images + roster to AI service</text>
  <text class="body" x="595" y="500">- Receive suggested present, review queue, unknown faces</text>
  <text class="body" x="595" y="526">- Persist finalized records to MongoDB</text>

  <rect class="box-db" x="570" y="570" width="420" height="240"/>
  <text class="box-title" x="780" y="605" text-anchor="middle">MongoDB + Mongoose Models</text>
  <text class="body" x="595" y="640">- User</text>
  <text class="small" x="700" y="640">student and teacher profile data</text>
  <text class="body" x="595" y="670">- Classroom</text>
  <text class="small" x="700" y="670">subject, section, join code, join link</text>
  <text class="body" x="595" y="700">- ClassMembership</text>
  <text class="small" x="700" y="700">roster mapping between class and student</text>
  <text class="body" x="595" y="730">- FaceProfile</text>
  <text class="small" x="700" y="730">summary metadata from AI enrollment</text>
  <text class="body" x="595" y="760">- AttendanceRecord</text>
  <text class="small" x="700" y="760">final present and absent records</text>

  <rect class="box-note" x="570" y="845" width="420" height="190"/>
  <text class="box-title" x="780" y="880" text-anchor="middle">What Actually Gets Stored Where</text>
  <text class="body" x="595" y="915">In MongoDB:</text>
  <text class="small" x="700" y="915">users, classrooms, memberships, face profile summary,</text>
  <text class="small" x="700" y="937">and finalized attendance records used by dashboards</text>
  <text class="body" x="595" y="970">In AI local JSON store:</text>
  <text class="small" x="740" y="970">profile vectors and raw session suggestions</text>
  <text class="small" x="595" y="998">Current implementation uses AI-local JSON for embeddings/session cache</text>

  <rect class="box-ai" x="1095" y="205" width="610" height="80"/>
  <text class="box-title" x="1400" y="238" text-anchor="middle">FastAPI AI Service</text>
  <text class="body" x="1125" y="266">Endpoints: /faces/enroll, /attendance/classroom-recognition, /attendance/finalize, /verification/face</text>

  <rect class="box-ai" x="1095" y="320" width="250" height="190"/>
  <text class="box-title" x="1220" y="355" text-anchor="middle">Enrollment Pipeline</text>
  <text class="body" x="1120" y="390">Input:</text>
  <text class="small" x="1180" y="390">studentId + multiple face images</text>
  <text class="body" x="1120" y="420">Step 1:</text>
  <text class="small" x="1180" y="420">generate reference embeddings</text>
  <text class="body" x="1120" y="450">Step 2:</text>
  <text class="small" x="1180" y="450">average embeddings into one profile vector</text>
  <text class="body" x="1120" y="480">Output:</text>
  <text class="small" x="1180" y="480">stored profile vector + quality score</text>

  <rect class="box-ai" x="1365" y="320" width="340" height="190"/>
  <text class="box-title" x="1535" y="355" text-anchor="middle">Selected / Configured Model Stack</text>
  <text class="body" x="1390" y="390">- Face Detection: SCRFD</text>
  <text class="body" x="1390" y="418">- Face Tracking: ByteTrack</text>
  <text class="body" x="1390" y="446">- Face Recognition: ArcFace-style embeddings</text>
  <text class="body" x="1390" y="474">- Review: teacher confirmation for uncertain matches</text>
  <text class="body" x="1390" y="502">- Anti-Spoof: MiniFASNetV2</text>

  <rect class="box-ai" x="1095" y="545" width="610" height="280"/>
  <text class="box-title" x="1400" y="580" text-anchor="middle">Classroom Attendance Pipeline</text>

  <rect class="mini" x="1125" y="620" width="120" height="95"/>
  <rect class="mini" x="1270" y="620" width="120" height="95"/>
  <rect class="mini" x="1415" y="620" width="120" height="95"/>
  <rect class="mini" x="1560" y="605" width="120" height="125"/>
  <text class="box-subtitle" x="1185" y="650" text-anchor="middle">Session Input</text>
  <text class="tiny" x="1185" y="674" text-anchor="middle">capture images</text>
  <text class="tiny" x="1185" y="694" text-anchor="middle">+ class roster</text>
  <text class="box-subtitle" x="1330" y="650" text-anchor="middle">Face Detection</text>
  <text class="tiny" x="1330" y="674" text-anchor="middle">find faces</text>
  <text class="tiny" x="1330" y="694" text-anchor="middle">in classroom image</text>
  <text class="box-subtitle" x="1475" y="650" text-anchor="middle">Tracking</text>
  <text class="tiny" x="1475" y="674" text-anchor="middle">group detections</text>
  <text class="tiny" x="1475" y="694" text-anchor="middle">into face tracks</text>
  <text class="box-subtitle" x="1620" y="640" text-anchor="middle">Recognition</text>
  <text class="tiny" x="1620" y="664" text-anchor="middle">capture embeddings</text>
  <text class="tiny" x="1620" y="684" text-anchor="middle">+ cosine similarity</text>
  <text class="tiny" x="1620" y="704" text-anchor="middle">against roster</text>

  <rect class="mini" x="1180" y="750" width="440" height="55"/>
  <text class="box-subtitle" x="1400" y="783" text-anchor="middle">Result Categories: present suggested | manual review | unknown face | absent candidates</text>

  <rect class="box-ai" x="1095" y="860" width="290" height="175"/>
  <text class="box-title" x="1240" y="895" text-anchor="middle">Liveness / Anti-Spoof Flow</text>
  <text class="body" x="1120" y="930">- Blink and head movement signals</text>
  <text class="body" x="1120" y="958">- Teacher review notes for uncertain or low-quality matches</text>
  <text class="body" x="1120" y="986">- Decision: allow, retry capture, or manual review</text>

  <rect class="box-db" x="1415" y="860" width="290" height="175"/>
  <text class="box-title" x="1560" y="895" text-anchor="middle">AI Local Storage</text>
  <text class="body" x="1440" y="930">- data/enrolled_profiles.json</text>
  <text class="body" x="1440" y="958">- data/attendance_sessions.json</text>
  <text class="small" x="1440" y="988">stores profile vectors and raw AI session output</text>

  <rect class="box-note" x="1095" y="1065" width="610" height="55"/>
  <text class="body" x="1125" y="1098">Implementation note: the service architecture is real, but current embeddings and scores run in deterministic simulated mode until production model weights are attached.</text>

  <path class="arrow" d="M170 265 L170 315"/>
  <path class="arrow" d="M390 265 L390 315"/>
  <text class="label" x="280" y="298" text-anchor="middle">user actions</text>

  <path class="arrow" d="M280 435 L280 470"/>
  <path class="arrow" d="M280 605 L280 640"/>
  <path class="arrow" d="M455 375 L570 375"/>
  <text class="label" x="510" y="360" text-anchor="middle">REST JSON</text>

  <path class="arrow" d="M780 320 L780 355"/>
  <path class="arrow" d="M780 530 L780 570"/>
  <text class="label" x="835" y="552">write final records</text>

  <path class="arrow" d="M990 420 L1040 420 L1040 725 L1450 725 L1450 760"/>
  <text class="label" x="1085" y="402">enroll / recognize / finalize</text>

  <path class="arrow-soft" d="M1180 778 L1060 778 L1060 560 L1015 560 L1015 455"/>
  <text class="label" x="1035" y="730">session output returned</text>
  <text class="label" x="1035" y="750">for backend finalization</text>

  <path class="arrow" d="M1245 667 L1270 667"/>
  <path class="arrow" d="M1390 667 L1415 667"/>
  <path class="arrow" d="M1535 667 L1560 667"/>

  <path class="arrow-soft" d="M1185 510 L1185 620"/>
  <path class="arrow-soft" d="M1230 805 L1230 842 L1240 842 L1240 860"/>
  <path class="arrow-soft" d="M1680 668 L1720 668 L1720 842 L1560 842 L1560 860"/>

  <path class="arrow-soft" d="M1220 510 L1220 545"/>
  <path class="arrow-soft" d="M1560 730 L1560 750"/>

  <path class="arrow-soft" d="M1240 510 L1520 510"/>
  <text class="label" x="1380" y="495" text-anchor="middle">profile vectors used for roster-restricted matching</text>

  <path class="arrow" d="M1240 455 L1240 510"/>
  <path class="arrow" d="M1560 1035 L1560 1065"/>

  <rect class="box-soft" x="70" y="1150" width="1660" height="80"/>
  <rect class="mini" x="95" y="1165" width="245" height="50"/>
  <rect class="mini" x="365" y="1165" width="245" height="50"/>
  <rect class="mini" x="635" y="1165" width="245" height="50"/>
  <rect class="mini" x="905" y="1165" width="245" height="50"/>
  <rect class="mini" x="1175" y="1165" width="245" height="50"/>
  <rect class="mini" x="1445" y="1165" width="245" height="50"/>

  <text class="step" x="217" y="1196" text-anchor="middle">1. Register / Login / Join Class</text>
  <text class="step" x="487" y="1196" text-anchor="middle">2. Enroll Face Profile</text>
  <text class="step" x="757" y="1196" text-anchor="middle">3. Teacher Starts Session</text>
  <text class="step" x="1027" y="1196" text-anchor="middle">4. AI Detects, Matches, Scores</text>
  <text class="step" x="1297" y="1196" text-anchor="middle">5. Teacher Reviews and Finalizes</text>
  <text class="step" x="1567" y="1196" text-anchor="middle">6. MongoDB Updates Dashboards</text>
</svg>
