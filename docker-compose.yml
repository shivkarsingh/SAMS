version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      AI_SERVICE_URL: http://ai-service:8000
      MONGO_URI: mongodb://mongo:27017/sams
    depends_on:
      - ai-service
      - mongo

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_PORT: 8000

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: sams
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
